version: '3.8'

services:
  web:
    build: .
    container_name: scarepath_web
    ports:
      - '8080:80'
    volumes:
      - ./:/var/www/html:delegated
    environment:
      DB_HOST: db
      DB_NAME: scarepath
      DB_USER: scarepath_user
      DB_PASS: secret
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: scarepath_db
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: scarepath
      MYSQL_USER: scarepath_user
      MYSQL_PASSWORD: secret
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: scarepath_phpmyadmin
    depends_on:
      - db
    ports:
      - '8081:80'
    environment:
      PMA_HOST: db
      PMA_USER: scarepath_user
      PMA_PASSWORD: secret
    restart: unless-stopped

volumes:
  db_data: {}
